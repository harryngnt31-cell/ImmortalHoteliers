<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Immortal Hoteliers</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080604'/><text y='.9em' font-size='80' x='10' fill='%23C9973A' font-family='Georgia'>IH</text></svg>">
<style>
  .error-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--ink); text-align: center; padding: 2rem;
    background-image: radial-gradient(ellipse at 50% 50%, rgba(201,151,58,0.06) 0%, transparent 65%);
  }
  .error-inner { max-width: 540px; animation: heroIn 1.2s cubic-bezier(0.16,1,0.3,1) both; }
  .error-num {
    font-family: var(--serif); font-size: clamp(8rem, 20vw, 14rem);
    font-weight: 300; color: rgba(201,151,58,0.18); line-height: 1;
    letter-spacing: -0.04em; margin-bottom: -1rem;
  }
  .error-title {
    font-family: var(--serif); font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 300; color: #fff; margin-bottom: 1rem;
  }
  .error-title em { font-style: italic; color: var(--gold); }
  .error-sub {
    font-size: 0.85rem; color: rgba(255,255,255,0.35); line-height: 1.9;
    font-weight: 300; margin-bottom: 2.5rem;
  }
  .error-divider {
    display: flex; align-items: center; gap: 1rem; justify-content: center; margin-bottom: 2.5rem;
  }
  .error-divider::before, .error-divider::after {
    content: ''; width: 40px; height: 1px; background: var(--gold); opacity: 0.3;
  }
  .error-divider span { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
</style>
</head>
<body>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-num">404</div>
      <div class="error-divider"><span>Lost in the lobby</span></div>
      <h1 class="error-title">This page has <em>checked out</em></h1>
      <p class="error-sub">The page you are looking for may have moved, been removed, or never existed. But the stories — those are still here.</p>
      <a class="btn" href="index.html">Return to Home</a>
    </div>
  </div>
</body>
</html>
